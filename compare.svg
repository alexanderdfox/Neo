<?xml version="1.0" encoding="utf-8"?>
<svg width="900" height="340" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <style>
	.title { font-family: system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 700; }
	.header { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
	.cell-label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #111827; }
	.cell-neo { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #111827; }
	.cell-oracle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #111827; }
	.badge-neo { fill: #22c55e; }
	.badge-oracle { fill: #ef4444; }
	.badge-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #ffffff; font-weight: 700; }
  </style>
  <text x="450" y="26" text-anchor="middle" class="title" style="white-space: pre;">
	Neo vs Oracle — Architecture &amp; DX
  </text>
  <rect x="0" y="40" width="300" height="40" fill="#0f172a"/>
  <rect x="300" y="40" width="300" height="40" fill="#0f172a"/>
  <rect x="600" y="40" width="300" height="40" fill="#0f172a"/>
  <text x="150" y="65" text-anchor="middle" class="header" style="white-space: pre;">Dimension</text>
  <text x="450" y="65" text-anchor="middle" class="header" style="white-space: pre;">Neo</text>
  <text x="750" y="65" text-anchor="middle" class="header" style="white-space: pre;">Oracle</text>
  <rect x="0" y="80" width="900" height="44" fill="#f9fafb"/>
  <rect x="0" y="124" width="900" height="44" fill="#ffffff"/>
  <rect x="0" y="168" width="900" height="44" fill="#f9fafb"/>
  <rect x="0" y="212" width="900" height="44" fill="#ffffff"/>
  <rect x="0" y="256" width="900" height="44" fill="#f9fafb"/>
  <text x="20" y="106" class="cell-label" style="white-space: pre;">Scaling model</text>
  <text x="320" y="98" class="cell-neo" style="white-space: pre;">
	Stateless APIs + PgBouncer + Redis,
  </text>
  <text x="320" y="114" class="cell-neo" style="white-space: pre;">
	scale via replicas (`--scale api=N`)
  </text>
  <text x="620" y="98" class="cell-oracle" style="white-space: pre;">
	RAC clusters, vertical scale on
  </text>
  <text x="620" y="114" class="cell-oracle" style="white-space: pre;">
	expensive licensed hardware
  </text>
  <text x="20" y="150" class="cell-label" style="white-space: pre;">Schema &amp; migrations</text>
  <text x="320" y="142" class="cell-neo" style="white-space: pre;">
	Prisma schema-as-code, git-backed
  </text>
  <text x="320" y="158" class="cell-neo" style="white-space: pre;">
	migrations, devs self-serve changes
  </text>
  <text x="620" y="142" class="cell-oracle" style="white-space: pre;">
	DDL + PL/SQL, DBA-gated changes,
  </text>
  <text x="620" y="158" class="cell-oracle" style="white-space: pre;">
	change boards and manual scripts
  </text>
  <text x="20" y="194" class="cell-label" style="white-space: pre;">Observability</text>
  <text x="320" y="186" class="cell-neo" style="white-space: pre;">
	OpenTelemetry traces/metrics/logs to
  </text>
  <text x="320" y="202" class="cell-neo" style="white-space: pre;">
	any OTLP backend (Datadog, Grafana…)
  </text>
  <text x="620" y="186" class="cell-oracle" style="white-space: pre;">
	AWR/ASH, DB-centric views, vendor
  </text>
  <text x="620" y="202" class="cell-oracle" style="white-space: pre;">
	tools tied to Oracle stack
  </text>
  <text x="20" y="238" class="cell-label" style="white-space: pre;">Cost &amp; lock‑in</text>
  <text x="320" y="230" class="cell-neo" style="white-space: pre;">
	Open source, commodity infra, easy
  </text>
  <text x="320" y="246" class="cell-neo" style="white-space: pre;">
	to move between clouds
  </text>
  <text x="620" y="230" class="cell-oracle" style="white-space: pre;">
	Per-core licensing, OCI gravity,
  </text>
  <text x="620" y="246" class="cell-oracle" style="white-space: pre;">
	audits and contract lock‑in
  </text>
  <text x="20" y="282" class="cell-label" style="white-space: pre;">Team fit &amp; velocity</text>
  <text x="320" y="274" class="cell-neo" style="white-space: pre;">
	TypeScript/Postgres stack, small teams
  </text>
  <text x="320" y="290" class="cell-neo" style="white-space: pre;">
	ship weekly with modern tooling
  </text>
  <text x="620" y="274" class="cell-oracle" style="white-space: pre;">
	Requires DBAs, Oracle specialists,
  </text>
  <text x="620" y="290" class="cell-oracle" style="white-space: pre;">
	slower, process-heavy releases
  </text>
</svg>